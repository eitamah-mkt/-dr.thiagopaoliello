<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeria | Portfólio Medicina</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#FAF9F8;
font-family:'Inter',sans-serif;
color:#021F33;
min-height:100vh;
padding:40px 24px;
}

.container{
max-width:1200px;
width:100%;
margin:0 auto;
}

.back-link{
display:inline-flex;
align-items:center;
gap:8px;
color:rgba(2,31,51,0.5);
text-decoration:none;
margin-bottom:32px;
font-size:14px;
transition:color 0.2s;
}

.back-link:hover{
color:#021F33;
}

.header{
text-align:center;
margin-bottom:48px;
}

h1{
font-size:32px;
font-weight:500;
letter-spacing:-0.5px;
color:#021F33;
margin-bottom:12px;
}

.subtitle{
font-size:16px;
color:rgba(2,31,51,0.6);
max-width:600px;
margin:0 auto;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:24px;
margin:40px 0;
}

.gallery-item{
background:#fff;
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:all 0.3s ease;
border:1px solid rgba(2,31,51,0.08);
box-shadow:0 2px 12px rgba(0,0,0,0.02);
position:relative;
}

.gallery-item:hover{
transform:translateY(-4px);
box-shadow:0 12px 28px rgba(0,0,0,0.08);
}

.gallery-item img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.video-badge{
position:absolute;
top:12px;
right:12px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(4px);
color:white;
padding:8px 12px;
border-radius:30px;
font-size:12px;
display:flex;
align-items:center;
gap:8px;
z-index:2;
pointer-events:none;
}

.video-badge i{
color:#25D366;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
justify-content:center;
align-items:center;
}

.modal.active{
display:flex;
}

.modal-content{
max-width:95vw;
max-height:95vh;
object-fit:contain;
border-radius:8px;
}

.modal-close{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:40px;
cursor:pointer;
background:rgba(0,0,0,0.5);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.modal-close:hover{
color:#25D366;
}

.footer{
margin-top:48px;
padding-top:24px;
border-top:1px solid rgba(2,31,51,0.1);
text-align:center;
}

.footer-content{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
flex-wrap:wrap;
font-size:12px;
color:rgba(2,31,51,0.5);
}

.footer-logo{
width:22px;
opacity:0.6;
}

.footer-link{
color:rgba(2,31,51,0.6);
text-decoration:none;
font-weight:500;
}

.footer-link:hover{
color:#021F33;
text-decoration:underline;
}

@media (max-width:768px){
body{padding:24px 16px;}
h1{font-size:26px;}
.gallery-item img{height:180px;}
}

@media (max-width:480px){
.gallery-grid{grid-template-columns:1fr;}
.gallery-item img{height:200px;}
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-link">
<i class="fas fa-arrow-left"></i> Voltar
</a>

<div class="header">
<h1>Portfólio de Imagens</h1>
<p class="subtitle">Conteúdos produzidos por HANGAR CREATIVE HUB</p>
</div>

<div class="gallery-grid">

<!-- IMAGENS 1 a 13 -->
<div class="gallery-item"><img src="Portifolio/medico/1.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/2.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/3.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/4.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/5.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/6.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/7.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/8.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/9.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/10.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/11.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/12.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/13.jpeg"></div>

<!-- VÍDEO NO MEIO -->
<div class="gallery-item" id="videoCard">
    <img src="Portifolio/medico/13.jpeg" id="videoThumb">
    <div class="video-badge">
        <i class="fas fa-play"></i> Assistir Vídeo
    </div>
</div>

<!-- IMAGENS 14 a 26 -->
<div class="gallery-item"><img src="Portifolio/medico/14.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/15.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/16.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/17.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/18.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/19.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/20.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/21.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/22.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/23.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/24.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/25.jpeg"></div>
<div class="gallery-item"><img src="Portifolio/medico/26.jpeg"></div>

</div>

<div class="footer">
<div class="footer-content">
<img src="images/perfil2.png" class="footer-logo">
<span>Powered by</span>
<a href="https://www.hangarcreativehub.com/" target="_blank" class="footer-link">HANGAR CREATIVE HUB</a>
</div>
</div>

</div>

<!-- Modal para imagem -->
<div id="imageModal" class="modal">
<span class="modal-close">&times;</span>
<img class="modal-content" id="modalImage">
</div>

<!-- Modal para vídeo -->
<div id="videoModal" class="modal">
<span class="modal-close" id="videoModalClose">&times;</span>
<video class="modal-content" id="modalVideo" controls>
<source src="Portifolio/medico/video.mp4" type="video/mp4">
</video>
</div>

<script>

// Modal de imagem
const imageModal = document.getElementById('imageModal');
const modalImage = document.getElementById('modalImage');

document.querySelectorAll('.gallery-item img').forEach(img => {
    if(img.id !== 'videoThumb') {
        img.addEventListener('click', () => {
            modalImage.src = img.src;
            imageModal.classList.add('active');
        });
    }
});

// Modal de vídeo
const videoModal = document.getElementById('videoModal');
const modalVideo = document.getElementById('modalVideo');
const videoCard = document.getElementById('videoCard');

videoCard.addEventListener('click', () => {
    modalVideo.load();
    videoModal.classList.add('active');
    modalVideo.play();
});

// Fechar modais
function closeImageModal() {
    imageModal.classList.remove('active');
}

function closeVideoModal() {
    videoModal.classList.remove('active');
    modalVideo.pause();
}

document.querySelectorAll('.modal-close').forEach(btn => {
    btn.onclick = () => {
        closeImageModal();
        closeVideoModal();
    };
});

imageModal.onclick = (e) => { if(e.target === imageModal) closeImageModal(); };
videoModal.onclick = (e) => { if(e.target === videoModal) closeVideoModal(); };

document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') {
        closeImageModal();
        closeVideoModal();
    }
});

</script>

</body>
</html>
