<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Dr. Thiago Paoliello x Hangar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #FAF9F8;
            font-family: 'Inter', sans-serif;
            color: #021F33;
            min-height: 100vh;
            padding: 40px 24px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(2, 31, 51, 0.5);
            text-decoration: none;
            margin-bottom: 32px;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #021F33;
        }
        
        /* Perfil duplo - Hangar × Paoliello */
        .partners-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .partner {
            text-align: center;
            flex: 1;
            min-width: 150px;
        }
        
        /* Hangar logo - SEM MOLDURA, retangular */
        .hangar-logo {
            width: 110px;
            height: auto;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        /* Paoliello foto - redonda */
        .paoliello-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(2, 31, 51, 0.15);
            margin-bottom: 10px;
        }
        
        .partner-name {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: #021F33;
            margin-bottom: 4px;
        }
        
        .partner-title {
            font-size: 10px;
            color: rgba(2, 31, 51, 0.6);
        }
        
        .divider-symbol {
            font-size: 20px;
            color: rgba(2, 31, 51, 0.25);
            font-weight: 300;
        }
        
        /* Título */
        .page-title {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .page-title h1 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #021F33;
            margin-bottom: 8px;
        }
        
        .page-title p {
            font-size: 13px;
            color: rgba(2, 31, 51, 0.6);
        }
        
        /* Moldura do vídeo - VERTICAL */
        .video-frame {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(2, 31, 51, 0.08);
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 177.78%; /* Proporção 9:16 (vertical) */
            background: #000;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Controles */
        .video-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }
        
        .play-btn {
            background: rgba(2, 31, 51, 0.08);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #021F33;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .play-btn:hover {
            background: rgba(2, 31, 51, 0.15);
            transform: scale(1.05);
        }
        
        /* FOOTER PADRONIZADO */
        .footer {
            margin-top: 48px;
            padding-top: 20px;
            border-top: 1px solid rgba(2, 31, 51, 0.1);
            text-align: center;
        }
        
        .footer-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 11px;
            color: rgba(2, 31, 51, 0.5);
        }
        
        .footer-logo {
            width: 24px;
            height: auto;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .footer-logo:hover {
            opacity: 1;
        }
        
        .footer-link {
            color: rgba(2, 31, 51, 0.6);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .footer-link:hover {
            color: #021F33;
            text-decoration: underline;
        }
        
        @media (max-width: 550px) {
            body {
                padding: 20px 16px;
            }
            
            .container {
                max-width: 100%;
            }
            
            .partners-header {
                gap: 16px;
            }
            
            .hangar-logo {
                width: 90px;
            }
            
            .paoliello-photo {
                width: 75px;
                height: 75px;
            }
            
            .partner-name {
                font-size: 12px;
            }
            
            .page-title h1 {
                font-size: 20px;
            }
            
            .video-frame {
                padding: 12px;
                border-radius: 20px;
            }
            
            .video-container {
                border-radius: 14px;
            }
            
            .play-btn {
                width: 42px;
                height: 42px;
                font-size: 16px;
            }
            
            .footer-logo {
                width: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>

        <!-- PERFIS LADO A LADO -->
        <div class="partners-header">
            <div class="partner">
                <img src="images/perfil2.png" alt="Hangar Creative Hub" class="hangar-logo">
                <div class="partner-name">Hangar Creative Hub</div>
                <div class="partner-title">estratégia · criação · performance</div>
            </div>
            <span class="divider-symbol">×</span>
            <div class="partner">
                <img src="images/perfil.jpg" alt="Dr. Thiago Paoliello" class="paoliello-photo">
                <div class="partner-name">Paoliello Clinic</div>
                <div class="partner-title">Dr. Thiago Paoliello | Cirurgia Plástica</div>
            </div>
        </div>
        
        <div class="page-title">
            <h1>Portfólio Medicina / Saúde</h1>
            <p>Conteúdo exclusivo desenvolvido para Dr. Thiago Paoliello</p>
        </div>
        
        <!-- Moldura com vídeo VERTICAL -->
        <div class="video-frame">
            <div class="video-container">
                <video id="portfolioVideo" poster="images/video-thumb.jpg">
                    <source src="portifolio/medico.mp4" type="video/mp4">
                    Seu navegador não suporta vídeos.
                </video>
            </div>
            <div class="video-controls">
                <button class="play-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </button>
            </div>
        </div>
        
        <!-- FOOTER PADRONIZADO -->
        <div class="footer">
            <div class="footer-content">
                <img src="images/perfil2.png" alt="Hangar" class="footer-logo">
                <span>Powered by</span>
                <a href="https://www.hangarcreativehub.com/" target="_blank" rel="noopener noreferrer" class="footer-link">HANGAR CREATIVE HUB</a>
            </div>
        </div>
    </div>
    
    <script>
        const video = document.getElementById('portfolioVideo');
        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = playBtn.querySelector('i');
        
        playBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
            } else {
                video.pause();
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
            }
        });
        
        video.addEventListener('ended', () => {
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
        });
    </script>
</body>
</html>
